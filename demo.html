// ─── ROUTER ───────────────────────────────────────────────────────────────
function useRouter() {
  const [page, setPage] = useState(() => window.location.hash.replace('#', '') || '/');
  const [params, setParams] = useState({});

  useEffect(() => {
    const handler = () => {
      const hash = window.location.hash;
      const [path, query] = hash.replace('#', '').split('?');
      const p = {};
      if (query) query.split('&').forEach(kv => { const [k,v]=kv.split('='); p[k]=decodeURIComponent(v||''); });
      setPage(path || '/');
      setParams(p);
    };
    window.addEventListener('hashchange', handler);
    handler();
    return () => window.removeEventListener('hashchange', handler);
  }, []);

  const navigate = (path) => { window.location.hash = path; };

  return { page, params, navigate };
}

// ─── BROWSE PAGE ──────────────────────────────────────────────────────────
function BrowsePage({ navigate, params }) {
  const [filters, setFilters] = useState({
    category: params.category || 'all',
    minPrice: 0, maxPrice: 200,
    instantBook: false, shipping: false, verified: false, sort: 'relevance'
  });
  const [searchQ, setSearchQ] = useState(params.q || '');
  const [viewMode, setViewMode] = useState('grid');
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [openSection, setOpenSection] = useState({cat:true, price:true, features:true});

  useEffect(() => {
    setSearchQ(params.q || '');
    if (params.category) setFilters(f => ({ ...f, category: params.category }));
  }, [params.q, params.category]);

  const results = useMemo(() => {
    let list = [...LISTINGS];
    if (searchQ) { const q = searchQ.toLowerCase(); list = list.filter(l => l.title.toLowerCase().includes(q) || l.location.toLowerCase().includes(q)); }
    if (filters.category !== 'all') list = list.filter(l => l.category === filters.category);
    list = list.filter(l => l.pricePerDay >= filters.minPrice && l.pricePerDay <= filters.maxPrice);
    if (filters.instantBook) list = list.filter(l => l.badges.includes('Instant Book'));
    if (filters.shipping) list = list.filter(l => l.shipping);
    if (filters.verified) list = list.filter(l => l.verified);
    if (filters.sort === 'price_asc') list.sort((a,b) => a.pricePerDay - b.pricePerDay);
    else if (filters.sort === 'price_desc') list.sort((a,b) => b.pricePerDay - a.pricePerDay);
    else if (filters.sort === 'rating') list.sort((a,b) => b.rating - a.rating);
    return list;
  }, [filters, searchQ]);

  const set = (k, v) => setFilters(f => ({ ...f, [k]: v }));
  const reset = () => setFilters({ category:'all', minPrice:0, maxPrice:200, instantBook:false, shipping:false, verified:false, sort:'relevance' });

  const chips = [];
  if (filters.category !== 'all') chips.push({ label: CATEGORIES.find(c=>c.id===filters.category)?.label, reset: () => set('category','all') });
  if (filters.minPrice > 0 || filters.maxPrice < 200) chips.push({ label: `$${filters.minPrice}–$${filters.maxPrice}/day`, reset: () => { set('minPrice',0); set('maxPrice',200); } });
  if (filters.instantBook) chips.push({ label:'Instant Book', reset: () => set('instantBook',false) });

  if (filters.verified) chips.push({ label:'Verified', reset: () => set('verified',false) });

      {/* Features */}

        <button onClick={() => setOpenSection(s=>({...s,features:!s.features}))} className="flex items-center justify-between w-full mb-3">
          <span className="text-sm font-bold text-rl-dark">Features</span>
          <Icon.Chevron open={openSection.features}/>
        </button>
        {openSection.features && (
          <div className="space-y-3">
            {[['instantBook','⚡ Instant Book','No owner approval needed'],['shipping','📦 Ships to me','Owner ships the item'],['verified','✅ Verified Owner','ID-verified listing owner']].map(([key,label,desc]) => (
              <label key={key} className="flex items-start gap-3 cursor-pointer group">
                <div className="relative mt-0.5">

                  <div className={`w-5 h-5 rounded-md border-2 transition-all flex items-center justify-center ${filters[key]?'bg-rl-blue border-rl-blue':'border-rl-gray-3 group-hover:border-rl-blue-300'}`}>
                    {filters[key] && <Icon.Check/>}

                </div>
                <div>
                  <span className="text-sm font-medium text-rl-dark">{label}</span>
                  <p className="text-xs text-rl-gray-2">{desc}</p>
                </div>

            ))}

        )}
      </div>
    </div>
  );

  return (
    <div className="min-h-screen flex flex-col">
      {/* Top bar */}
      <div className="bg-white border-b border-rl-gray-3 sticky top-16 z-40">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center gap-3">
          <button onClick={() => setSidebarOpen(!sidebarOpen)} className="lg:hidden flex items-center gap-2 border border-rl-gray-3 text-rl-dark-3 px-3.5 py-2 rounded-xl text-sm font-medium hover:border-rl-blue hover:text-rl-blue-600 bg-white">
            <Icon.Filter/>Filters{chips.length>0&&<span className="bg-rl-blue text-white text-xs w-4 h-4 rounded-full flex items-center justify-center font-bold">{chips.length}</span>}

          <div className="flex-1 flex items-center gap-2 overflow-x-auto scrollbar-hide">

            {chips.map((c,i) => <button key={i} onClick={c.reset} className="inline-flex items-center gap-1.5 bg-rl-blue-100 text-rl-blue-600 border border-rl-blue-200 text-xs font-semibold px-3 py-1.5 rounded-full hover:bg-rl-blue-200 shrink-0">{c.label} <Icon.X/></button>)}

          <div className="hidden lg:flex items-center gap-3 shrink-0">
            <select value={filters.sort} onChange={e=>set('sort',e.target.value)} className="w-44 px-3 py-2 border border-rl-gray-3 rounded-xl text-sm text-rl-dark outline-none focus:border-rl-blue bg-white">

            <div className="flex items-center border border-rl-gray-3 rounded-xl overflow-hidden">

              <button onClick={()=>setViewMode('list')} className={`p-2 transition-colors ${viewMode==='list'?'bg-rl-blue text-white':'text-rl-gray hover:bg-rl-gray-4'}`}><Icon.List/></button>

      <div className="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 py-8 flex gap-8">

        {sidebarOpen && <div className="lg:hidden fixed inset-0 bg-black/40 z-50" onClick={()=>setSidebarOpen(false)}/>}

        {/* Sidebar */}
        <aside className={`${sidebarOpen?'translate-x-0':'-translate-x-full lg:translate-x-0'} fixed lg:static top-0 left-0 h-full lg:h-auto z-50 lg:z-auto w-72 lg:w-64 xl:w-72 shrink-0 bg-white lg:bg-transparent shadow-2xl lg:shadow-none transition-transform duration-300 ease-in-out overflow-y-auto lg:overflow-visible p-5 lg:p-0`}>
          <div className="lg:hidden flex items-center justify-between mb-5 pb-4 border-b border-rl-gray-3">
            <h2 className="font-bold text-rl-dark">Filters</h2>

        {/* Results */}
        <main className="flex-1 min-w-0">
          <div className="flex items-center justify-between mb-5">
            <div>
              <h1 className="text-lg font-bold text-rl-dark">{searchQ?`Results for "${searchQ}"`:CATEGORIES.find(c=>c.id===filters.category)?.label||'All Items'}</h1>
              <p className="text-sm text-rl-gray mt-0.5">{results.length} {results.length===1?'item':'items'} available</p>

          {results.length === 0 ? (

              <div className="text-5xl mb-4">🔍</div>

              <button onClick={()=>{reset();setSearchQ('');}} className="bg-rl-blue text-white font-semibold px-6 py-2.5 rounded-xl text-sm hover:bg-rl-blue-500 transition-colors">Clear all filters</button>
            </div>
          ) : viewMode === 'grid' ? (
            <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5">
              {results.map(l => <ListingCard key={l.id} listing={l} navigate={navigate}/>)}

          ) : (
            <div className="flex flex-col gap-3">
              {results.map(l => (
                <div key={l.id} className="bg-white rounded-2xl shadow-card border border-rl-gray-3/60 hover:shadow-card-hover transition-all flex gap-4 p-4 cursor-pointer" onClick={() => navigate(`/listing/${l.id}`)}>
                  <div className="w-36 h-28 rounded-xl overflow-hidden shrink-0 bg-rl-gray-4">
                    <img src={l.image} alt={l.title} className="w-full h-full object-cover" loading="lazy"/>

                  <div className="flex-1 min-w-0 flex flex-col justify-between">
                    <div>
                      <h3 className="font-semibold text-rl-dark text-sm line-clamp-1 hover:text-rl-blue-600 mb-1">{l.title}</h3>

                        <button className="bg-rl-blue text-white text-xs font-semibold px-4 py-1.5 rounded-xl hover:bg-rl-blue-500 transition-colors">Book</button>

function ImageGallery({ images, title }) {
  const [active, setActive] = useState(0);
  const [lb, setLb] = useState(false);
  const prev = () => setActive(i => (i - 1 + images.length) % images.length);
  const next = () => setActive(i => (i + 1) % images.length);
  useEffect(() => {
    if (!lb) return;
    const h = e => { if (e.key === 'Escape') setLb(false); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [lb]);
  return (
    <>
      {/* Desktop 2-col grid */}
      <div className="hidden md:grid grid-cols-2 gap-2 rounded-2xl overflow-hidden h-[400px]">
        <div className="cursor-pointer group overflow-hidden" onClick={() => { setActive(0); setLb(true); }}>
          <img src={images[0]} alt={title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"/>
        </div>
        <div className="grid grid-rows-2 gap-2 h-full">
          {images.slice(1, 3).map((img, i) => (
            <div key={i} className="relative cursor-pointer group overflow-hidden" onClick={() => { setActive(i+1); setLb(true); }}>
              <img src={img} alt={`${title} ${i+2}`} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"/>
              {i===1 && images.length>3 && (
                <div className="absolute inset-0 bg-black/40 flex items-center justify-center">
                  <span className="text-white font-bold text-lg">+{images.length-3} more</span>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
      {/* Mobile single image */}
      <div className="md:hidden relative rounded-2xl overflow-hidden h-72 bg-rl-gray-4">
        <img src={images[active]} alt={title} className="w-full h-full object-cover"/>
        {images.length > 1 && (
          <>
            <button onClick={prev} className="absolute left-3 top-1/2 -translate-y-1/2 w-9 h-9 bg-white/90 backdrop-blur rounded-full flex items-center justify-center shadow-md">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
            </button>
            <button onClick={next} className="absolute right-3 top-1/2 -translate-y-1/2 w-9 h-9 bg-white/90 backdrop-blur rounded-full flex items-center justify-center shadow-md">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
            </button>
            <div className="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-1.5">
              {images.map((_,i) => <button key={i} onClick={() => setActive(i)} className={`rounded-full transition-all ${active===i?'w-5 h-2 bg-white':'w-2 h-2 bg-white/60'}`}/>)}
            </div>
          </>
        )}
      </div>
      {/* Lightbox */}
      {lb && (
        <div className="fixed inset-0 z-50 bg-black/90 flex items-center justify-center" onClick={() => setLb(false)}>
          <button className="absolute top-4 right-4 text-white/80 hover:text-white text-3xl w-10 h-10 flex items-center justify-center" onClick={() => setLb(false)}>✕</button>
          <button className="absolute left-4 top-1/2 -translate-y-1/2 w-12 h-12 bg-white/10 hover:bg-white/20 rounded-full flex items-center justify-center text-white" onClick={e => { e.stopPropagation(); prev(); }}>
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
          </button>
          <img src={images[active]} alt={title} className="max-h-[85vh] max-w-[85vw] object-contain rounded-xl" onClick={e => e.stopPropagation()}/>
          <button className="absolute right-4 top-1/2 -translate-y-1/2 w-12 h-12 bg-white/10 hover:bg-white/20 rounded-full flex items-center justify-center text-white" onClick={e => { e.stopPropagation(); next(); }}>
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
          </button>
          <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2">
            {images.map((_,i) => <button key={i} onClick={e => { e.stopPropagation(); setActive(i); }} className={`rounded-full transition-all ${active===i?'w-6 h-2 bg-white':'w-2 h-2 bg-white/40'}`}/>)}
          </div>
        </div>
      )}
    </>
  );
}

function BookingWidget({ listing, onAddToCart }) {
  const today = new Date();
  const fmt = d => d.toISOString().split('T')[0];
  const t1 = new Date(today); t1.setDate(today.getDate()+1);
  const t3 = new Date(today); t3.setDate(today.getDate()+3);
  const [start, setStart] = useState(fmt(t1));
  const [end, setEnd] = useState(fmt(t3));
  const [qty, setQty] = useState(1);
  const [fulfillment, setFulfillment] = useState(listing.fulfillment === 'shipping' ? 'shipping' : 'pickup');
  const [added, setAdded] = useState(false);

  const days = Math.max(1, Math.round((new Date(end) - new Date(start)) / 86400000));
  const base = days * listing.pricePerDay * qty;
  const ins = Math.round(base * 0.08);
  const svc = Math.round(base * 0.12);
  const shippingFee = fulfillment === 'shipping' ? 24 : 0;
  const total = base + ins + svc + shippingFee;

  const handleAddToCart = () => {
    onAddToCart({ listingId:listing.id, title:listing.title, image:listing.image, ownerName:listing.ownerName, pricePerDay:listing.pricePerDay, start, end, days, qty, fulfillment, base, ins, svc, shippingFee, total });
    setAdded(true);
    setTimeout(() => setAdded(false), 2500);
  };

  if (added) return (
    <div className="bg-white border border-rl-gray-3 rounded-2xl p-6 shadow-card text-center">
      <div className="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg className="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>
      </div>
      <h3 className="text-lg font-extrabold text-rl-dark mb-1">Added to Cart!</h3>
      <p className="text-sm text-rl-gray mb-5">{listing.title} has been added to your cart.</p>
      <button onClick={() => setAdded(false)} className="w-full border border-rl-blue text-rl-blue font-semibold px-4 py-2.5 rounded-xl text-sm hover:bg-rl-blue-50 transition-colors">Continue Browsing</button>
    </div>
  );

  return (
    <div className="bg-white border border-rl-gray-3 rounded-2xl shadow-card overflow-hidden">
      <div className="px-6 pt-5 pb-4 border-b border-rl-gray-3">
        <div className="flex items-baseline gap-1">
          <span className="text-2xl font-extrabold text-rl-dark">${listing.pricePerDay}</span>
          <span className="text-rl-gray text-sm">/ day{qty > 1 ? ` × ${qty} units` : ''}</span>
        </div>
        <div className="flex items-center gap-1 mt-0.5">
          <Icon.Star/><span className="text-sm font-semibold text-rl-dark">{listing.rating}</span>
          <span className="text-xs text-rl-gray-2">({listing.reviewCount} reviews)</span>
        </div>
      </div>
      <div className="px-6 py-4 space-y-4">

        {/* Dates */}
        <div>
          <label className="text-xs font-bold text-rl-dark uppercase tracking-wide block mb-2">Rental Dates</label>
          <div className="grid grid-cols-2 gap-2">
            <div>
              <p className="text-xs text-rl-gray-2 mb-1">Start</p>
              <input type="date" value={start} min={fmt(t1)}
                onChange={e => { setStart(e.target.value); const ne=new Date(e.target.value); ne.setDate(ne.getDate()+Math.max(1,days)); setEnd(fmt(ne)); }}
                className="w-full border border-rl-gray-3 rounded-xl px-3 py-2 text-sm text-rl-dark focus:outline-none focus:border-rl-blue focus:ring-2 focus:ring-rl-blue-200"/>
            </div>
            <div>
              <p className="text-xs text-rl-gray-2 mb-1">End</p>
              <input type="date" value={end} min={start}
                onChange={e => setEnd(e.target.value)}
                className="w-full border border-rl-gray-3 rounded-xl px-3 py-2 text-sm text-rl-dark focus:outline-none focus:border-rl-blue focus:ring-2 focus:ring-rl-blue-200"/>
            </div>
          </div>
          <p className="text-xs text-rl-blue-600 font-medium mt-2 text-center">{days} day{days!==1?'s':''} selected</p>
        </div>

        {/* Quantity */}
        <div>
          <label className="text-xs font-bold text-rl-dark uppercase tracking-wide block mb-2">Quantity</label>
          <div className="flex items-center gap-3">
            <button onClick={() => setQty(q => Math.max(1,q-1))} className="w-9 h-9 rounded-xl border border-rl-gray-3 flex items-center justify-center text-rl-dark font-bold hover:border-rl-blue hover:text-rl-blue transition-colors text-lg">−</button>
            <span className="text-base font-bold text-rl-dark min-w-[2rem] text-center">{qty}</span>
            <button onClick={() => setQty(q => q+1)} className="w-9 h-9 rounded-xl border border-rl-gray-3 flex items-center justify-center text-rl-dark font-bold hover:border-rl-blue hover:text-rl-blue transition-colors text-lg">+</button>
            <span className="text-xs text-rl-gray-2">unit{qty!==1?'s':''}</span>
          </div>
        </div>

        {/* Fulfillment */}
        {listing.fulfillment === 'both' && (
          <div>
            <label className="text-xs font-bold text-rl-dark uppercase tracking-wide block mb-2">How to Receive</label>
            <div className="grid grid-cols-2 gap-2">
              <button onClick={() => setFulfillment('pickup')} className={`py-2.5 px-3 rounded-xl border text-sm font-semibold flex items-center justify-center gap-1.5 transition-all ${fulfillment==='pickup' ? 'border-rl-blue bg-rl-blue-50 text-rl-blue' : 'border-rl-gray-3 text-rl-dark hover:border-rl-blue'}`}>📍 Local Pickup</button>
              <button onClick={() => setFulfillment('shipping')} className={`py-2.5 px-3 rounded-xl border text-sm font-semibold flex items-center justify-center gap-1.5 transition-all ${fulfillment==='shipping' ? 'border-rl-blue bg-rl-blue-50 text-rl-blue' : 'border-rl-gray-3 text-rl-dark hover:border-rl-blue'}`}>📦 Ship to Me</button>
            </div>
          </div>
        )}
        {listing.fulfillment === 'pickup' && (
          <div className="flex items-center gap-2 py-2 px-3 bg-amber-50 border border-amber-200 rounded-xl">
            <span className="text-base">📍</span><span className="text-xs font-medium text-amber-800">Local Pickup Only — {listing.location}</span>
          </div>
        )}
        {listing.fulfillment === 'shipping' && (
          <div className="flex items-center gap-2 py-2 px-3 bg-blue-50 border border-blue-200 rounded-xl">
            <span className="text-base">📦</span><span className="text-xs font-medium text-blue-800">Shipping Only — prepaid return label included</span>
          </div>
        )}

          </div>
        ) : (
          <>
            <div className="flex-1 overflow-y-auto divide-y divide-rl-gray-3">
              {cart.map((item, i) => (
                <div key={i} className="p-4 flex gap-3">
                  <img src={item.image} alt={item.title} className="w-20 h-16 object-cover rounded-xl shrink-0"/>

                    <p className="font-semibold text-rl-dark text-sm leading-tight truncate">{item.title}</p>
                    <p className="text-xs text-rl-gray mt-0.5">{item.days} day{item.days!==1?'s':''} · {item.qty} unit{item.qty!==1?'s':''} · {item.fulfillment==='shipping' ? '📦 Shipped' : '📍 Pickup'}</p>
                    <p className="text-xs text-rl-gray-2 mt-0.5">{item.start} → {item.end}</p>

              <div className="flex justify-between font-extrabold text-rl-dark">
                <span>Subtotal</span><span>${cartTotal}</span>

    </div>
  );

      <div className="text-center px-4">
        <div className="text-4xl mb-3">🛒</div>
        <h2 className="text-xl font-extrabold text-rl-dark mb-2">Your cart is empty</h2>
        <button onClick={() => navigate('/browse')} className="bg-rl-blue text-white font-semibold px-6 py-2.5 rounded-xl text-sm mt-4 hover:bg-rl-blue-500 transition-colors">Browse Listings</button>
      </div>
    </div>
  );

  const validate = () => {
    const e = {};
    if (!form.firstName.trim()) e.firstName = 'Required';
    if (!form.lastName.trim()) e.lastName = 'Required';
    if (!form.email.trim() || !/\S+@\S+\.\S+/.test(form.email)) e.email = 'Valid email required';
    if (!form.phone.trim()) e.phone = 'Required';
    if (hasShipping) {
      if (!form.address.trim()) e.address = 'Required for shipped items';
      if (!form.city.trim()) e.city = 'Required';
      if (!form.state.trim()) e.state = 'Required';
      if (!form.zip.trim()) e.zip = 'Required';
    }
    if (!form.intendedUse.trim() || form.intendedUse.trim().length < 20) e.intendedUse = 'Please describe your intended use (min 20 characters)';
    if (!form.agreedToTerms) e.agreedToTerms = 'You must agree to the rental terms to continue';
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const handleSubmit = () => {
    if (validate()) { setStep(2); if (onOrderComplete) onOrderComplete(); }
  };

  if (step === 2) return (
    <div className="min-h-screen bg-rl-off-white py-12 px-4">
      <div className="max-w-lg mx-auto">
        <div className="bg-white rounded-2xl shadow-card p-8 text-center mb-6">
          <div className="w-20 h-20 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-5">
            <svg className="w-10 h-10 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>
          </div>
          <h2 className="text-2xl font-extrabold text-rl-dark mb-2">Booking Confirmed!</h2>
          <p className="text-rl-gray text-sm mb-6">Your rental request has been submitted. Confirmation sent to <strong>{form.email}</strong>.</p>
          {hasShipping && (
            <div className="bg-rl-blue-50 border border-rl-blue-200 rounded-xl p-5 text-left mb-6">
              <h3 className="font-bold text-rl-dark mb-3 flex items-center gap-2"><span>📦</span> Shipping Labels Ready</h3>
              <p className="text-xs text-rl-dark-3 mb-3">Two prepaid shipping labels generated via <strong>EasyPost</strong> for each shipped item:</p>
              <div className="space-y-3">
                <div className="flex items-center gap-3 bg-white rounded-xl px-4 py-3 border border-rl-blue-200">
                  <div className="w-8 h-8 bg-rl-blue rounded-lg flex items-center justify-center shrink-0"><span className="text-white text-xs font-bold">1</span></div>
                  <div><p className="text-sm font-semibold text-rl-dark">Outbound Label</p><p className="text-xs text-rl-gray">Owner ships to you · USPS Priority Mail</p></div>
                  <button className="ml-auto text-xs font-semibold text-rl-blue hover:underline shrink-0">Download ↓</button>
                </div>
                <div className="flex items-center gap-3 bg-white rounded-xl px-4 py-3 border border-rl-blue-200">
                  <div className="w-8 h-8 bg-rl-blue rounded-lg flex items-center justify-center shrink-0"><span className="text-white text-xs font-bold">2</span></div>
                  <div><p className="text-sm font-semibold text-rl-dark">Return Label</p><p className="text-xs text-rl-gray">You ship back to owner · USPS Priority Mail</p></div>
                  <button className="ml-auto text-xs font-semibold text-rl-blue hover:underline shrink-0">Download ↓</button>
                </div>
              </div>
              <p className="text-xs text-rl-gray-2 mt-3">Labels also emailed to {form.email} · Powered by <strong>EasyPost</strong></p>
            </div>
          )}
          <div className="bg-rl-gray-4 rounded-xl p-4 text-left mb-6">
            <h3 className="font-bold text-rl-dark text-sm mb-3">Order Summary</h3>
            {cart.map((item, i) => (
              <div key={i} className="flex justify-between text-sm py-1.5 border-b border-rl-gray-3 last:border-0">
                <span className="text-rl-dark truncate mr-3">{item.title} ×{item.qty}</span>
                <span className="text-rl-dark font-semibold shrink-0">${item.total}</span>
              </div>
            ))}
            <div className="flex justify-between font-extrabold text-rl-dark pt-2 mt-1 text-base">
              <span>Total Charged</span><span>${cartTotal}</span>
            </div>
          </div>
          <button onClick={() => navigate('/')} className="w-full bg-rl-blue text-white font-bold py-3 rounded-xl text-sm hover:bg-rl-blue-500 transition-colors">Back to Home</button>
        </div>
      </div>
    </div>
  );

  const inputCls = (k) => `w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-rl-blue-200 focus:border-rl-blue ${errors[k] ? 'border-red-400' : 'border-rl-gray-3'}`;

  return (
    <div className="min-h-screen bg-rl-off-white py-8 px-4">
      <div className="max-w-3xl mx-auto">
        <button onClick={() => navigate('/browse')} className="flex items-center gap-1 text-rl-gray text-sm mb-6 hover:text-rl-dark transition-colors">← Continue Shopping</button>
        <h1 className="text-2xl font-extrabold text-rl-dark mb-6">Checkout</h1>
        <div className="grid lg:grid-cols-5 gap-6">

          {/* Left — forms */}
          <div className="lg:col-span-3 space-y-5">

            {/* Renter info */}
            <div className="bg-white rounded-2xl shadow-card p-6">
              <h2 className="font-extrabold text-rl-dark mb-4">Your Information</h2>
              <div className="grid grid-cols-2 gap-3 mb-3">
                <div>
                  <label className="text-xs font-bold text-rl-dark uppercase tracking-wide block mb-1.5">First Name</label>
                  <input value={form.firstName} onChange={e=>upd('firstName',e.target.value)} className={inputCls('firstName')} placeholder="Jane"/>
                  {errors.firstName && <p className="text-red-500 text-xs mt-1">{errors.firstName}</p>}
                </div>
                <div>
                  <label className="text-xs font-bold text-rl-dark uppercase tracking-wide block mb-1.5">Last Name</label>
                  <input value={form.lastName} onChange={e=>upd('lastName',e.target.value)} className={inputCls('lastName')} placeholder="Smith"/>
                  {errors.lastName && <p className="text-red-500 text-xs mt-1">{errors.lastName}</p>}
                </div>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="text-xs font-bold text-rl-dark uppercase tracking-wide block mb-1.5">Email</label>
                  <input type="email" value={form.email} onChange={e=>upd('email',e.target.value)} className={inputCls('email')} placeholder="jane@example.com"/>
                  {errors.email && <p className="text-red-500 text-xs mt-1">{errors.email}</p>}
                </div>
                <div>
                  <label className="text-xs font-bold text-rl-dark uppercase tracking-wide block mb-1.5">Phone</label>
                  <input type="tel" value={form.phone} onChange={e=>upd('phone',e.target.value)} className={inputCls('phone')} placeholder="(555) 000-0000"/>
                  {errors.phone && <p className="text-red-500 text-xs mt-1">{errors.phone}</p>}
                </div>
              </div>
            </div>

            {/* Shipping address */}
            {hasShipping && (
              <div className="bg-white rounded-2xl shadow-card p-6">
                <h2 className="font-extrabold text-rl-dark mb-1">Shipping Address</h2>
                <p className="text-xs text-rl-gray mb-4">One or more items will be shipped. Prepaid return labels are included via EasyPost.</p>
                <div className="space-y-3">
                  <div>
                    <label className="text-xs font-bold text-rl-dark uppercase tracking-wide block mb-1.5">Street Address</label>
                    <input value={form.address} onChange={e=>upd('address',e.target.value)} className={inputCls('address')} placeholder="123 Main St, Apt 4B"/>
                    {errors.address && <p className="text-red-500 text-xs mt-1">{errors.address}</p>}
                  </div>
                  <div className="grid grid-cols-3 gap-3">
                    <div className="col-span-1">
                      <label className="text-xs font-bold text-rl-dark uppercase tracking-wide block mb-1.5">City</label>
                      <input value={form.city} onChange={e=>upd('city',e.target.value)} className={inputCls('city')} placeholder="Austin"/>
                      {errors.city && <p className="text-red-500 text-xs mt-1">{errors.city}</p>}
                    </div>
                    <div>
                      <label className="text-xs font-bold text-rl-dark uppercase tracking-wide block mb-1.5">State</label>
                      <input value={form.state} onChange={e=>upd('state',e.target.value)} className={inputCls('state')} placeholder="TX"/>
                      {errors.state && <p className="text-red-500 text-xs mt-1">{errors.state}</p>}
                    </div>
                    <div>
                      <label className="text-xs font-bold text-rl-dark uppercase tracking-wide block mb-1.5">ZIP</label>
                      <input value={form.zip} onChange={e=>upd('zip',e.target.value)} className={inputCls('zip')} placeholder="78701"/>
                      {errors.zip && <p className="text-red-500 text-xs mt-1">{errors.zip}</p>}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* Intended use */}
            <div className="bg-white rounded-2xl shadow-card p-6">
              <h2 className="font-extrabold text-rl-dark mb-1">Intended Use <span className="text-red-500">*</span></h2>
              <p className="text-xs text-rl-gray mb-3">Tell the owner exactly what you plan to use this item for. This is required and shared with the owner before they approve your request.</p>
              <textarea value={form.intendedUse} onChange={e=>upd('intendedUse',e.target.value)} rows={4}
                className={`w-full border rounded-xl px-3 py-2.5 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-rl-blue-200 focus:border-rl-blue ${errors.intendedUse ? 'border-red-400' : 'border-rl-gray-3'}`}
                placeholder="e.g. I'm building a deck this weekend and need the drill for mounting boards. I have experience with power tools and will keep everything clean and return it in perfect condition."/>
              <div className="flex justify-between mt-1">
                {errors.intendedUse ? <p className="text-red-500 text-xs">{errors.intendedUse}</p> : <span/>}
                <p className={`text-xs ${form.intendedUse.length < 20 ? 'text-rl-gray-2' : 'text-emerald-600'}`}>{form.intendedUse.length} / 20+ chars</p>
              </div>
            </div>

            {/* Rental Terms */}
            <div className="bg-white rounded-2xl shadow-card p-6">
              <h2 className="font-extrabold text-rl-dark mb-3">Rental Terms</h2>
              <div className="bg-rl-gray-4 rounded-xl p-4 text-xs text-rl-dark-3 leading-relaxed space-y-2.5 max-h-52 overflow-y-auto mb-4 border border-rl-gray-3">
                <p className="font-bold text-rl-dark text-sm">Rentaleze Rental Agreement</p>
                <p><strong>Late Returns:</strong> Items returned after the agreed end date are charged 1.5× the daily rate per late day. After 5 overdue days, the item is considered unreturned and the full replacement value is charged.</p>
                <p><strong>Damage Policy:</strong> Renters are responsible for damage beyond normal wear. Minor damage may incur fees up to the insurance deductible. Major damage or loss is charged at replacement value minus coverage already paid.</p>
                <p><strong>Theft or Loss:</strong> If an item is lost or stolen while in your possession, you are liable for full replacement cost. Verified theft with a police report on file is covered by Rentaleze rental insurance.</p>
                <p><strong>Cancellation:</strong> Free cancellation up to 48 hours before rental start. Cancellations within 48 hours are charged 50% of the rental fee. No-shows are charged the full amount.</p>
                <p><strong>Shipping:</strong> Renter receives two prepaid shipping labels via EasyPost (USPS). Items must be packaged securely and dropped off at a USPS location. The return label must be used before the rental end date.</p>
                <p><strong>Prohibited Use:</strong> Items may not be used for illegal purposes, commercial subletting, or in ways that void the owner's insurance. Use must match your stated intended purpose.</p>
                <p><strong>Disputes:</strong> All disputes are handled through the Rentaleze Resolution Center. Payment holds may apply while a dispute is under review.</p>
              </div>
              <label className={`flex items-start gap-3 cursor-pointer p-3.5 rounded-xl border transition-all ${form.agreedToTerms ? 'border-emerald-400 bg-emerald-50' : errors.agreedToTerms ? 'border-red-400 bg-red-50' : 'border-rl-gray-3 hover:border-rl-blue'}`}>
                <input type="checkbox" checked={form.agreedToTerms} onChange={e=>upd('agreedToTerms',e.target.checked)} className="mt-0.5 w-4 h-4 accent-rl-blue shrink-0"/>
                <span className="text-sm text-rl-dark">I have read and agree to the <span className="font-semibold text-rl-blue">Rentaleze Rental Terms</span>, including the damage policy, late return fees, and cancellation policy.</span>
              </label>
              {errors.agreedToTerms && <p className="text-red-500 text-xs mt-2">{errors.agreedToTerms}</p>}
            </div>
          </div>

          {/* Right — order summary */}
          <div className="lg:col-span-2">
            <div className="bg-white rounded-2xl shadow-card p-5 sticky top-24">
              <h2 className="font-extrabold text-rl-dark mb-4">Order Summary</h2>
              <div className="space-y-3 mb-4 max-h-64 overflow-y-auto">
                {cart.map((item, i) => (
                  <div key={i} className="flex gap-3">
                    <img src={item.image} alt={item.title} className="w-14 h-12 object-cover rounded-lg shrink-0"/>
                    <div className="flex-1 min-w-0">
                      <p className="text-xs font-semibold text-rl-dark leading-tight line-clamp-2">{item.title}</p>
                      <p className="text-xs text-rl-gray mt-0.5">{item.days}d · ×{item.qty} · {item.fulfillment==='shipping'?'📦':'📍'}</p>
                      <div className="flex justify-between items-center mt-1">
                        <span className="text-sm font-bold text-rl-dark">${item.total}</span>
                        <button onClick={() => onRemove(i)} className="text-xs text-red-400 hover:text-red-600">✕</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              <div className="border-t border-rl-gray-3 pt-3 space-y-1.5 mb-4 text-sm">
                <div className="flex justify-between text-rl-gray"><span>Rental subtotal</span><span>${cart.reduce((s,i)=>s+i.base,0)}</span></div>
                <div className="flex justify-between text-rl-gray"><span>Insurance</span><span>${cart.reduce((s,i)=>s+i.ins,0)}</span></div>
                <div className="flex justify-between text-rl-gray"><span>Service fees</span><span>${cart.reduce((s,i)=>s+i.svc,0)}</span></div>
                {hasShipping && <div className="flex justify-between text-rl-gray"><span>📦 Shipping labels</span><span>${cart.reduce((s,i)=>s+(i.shippingFee||0),0)}</span></div>}
                <div className="flex justify-between font-extrabold text-rl-dark text-base pt-2 border-t border-rl-gray-3"><span>Total</span><span>${cartTotal}</span></div>
              </div>
              <button onClick={handleSubmit} className="w-full bg-rl-blue hover:bg-rl-blue-500 text-white font-bold py-3.5 rounded-xl text-sm transition-colors">Place Order →</button>
              <p className="text-xs text-center text-rl-gray-2 mt-3">🔒 Secure checkout · Rentaleze Guarantee</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────
function App() {
  const { page, params, navigate } = useRouter();
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);

  const addToCart = (item) => {
    setCart(c => [...c, item]);
    setCartOpen(true);
  };
  const removeFromCart = (index) => setCart(c => c.filter((_, i) => i !== index));
  const clearCart = () => setCart([]);

  const renderPage = () => {
    if (page === '/') return <HomePage navigate={navigate}/>;
    if (page === '/browse') return <BrowsePage navigate={navigate} params={params}/>;
    if (page.startsWith('/listing/')) return <ListingDetail navigate={navigate} id={page.split('/')[2]} onAddToCart={addToCart}/>;
    if (page === '/checkout') return <CheckoutPage cart={cart} onRemove={removeFromCart} navigate={navigate} onOrderComplete={clearCart}/>;
    return (
      <div className="min-h-screen flex items-center justify-center bg-rl-off-white">
        <div className="text-center px-4">
          <div className="text-6xl font-black text-rl-blue-200 mb-2">404</div>
          <h2 className="text-xl font-extrabold text-rl-dark mb-2">Page not found</h2>
          <button onClick={() => navigate('/')} className="bg-rl-blue text-white font-semibold px-6 py-2.5 rounded-xl text-sm mt-4 hover:bg-rl-blue-500 transition-colors">← Back to Homepage</button>
        </div>
      </div>
    );
  };

  return (
    <div className="min-h-screen flex flex-col">
      <Navbar navigate={navigate} currentPage={page} cartCount={cart.length} onOpenCart={() => setCartOpen(true)}/>
      <main className="flex-1">{renderPage()}</main>
      {cartOpen && <CartDrawer cart={cart} onClose={() => setCartOpen(false)} onRemove={removeFromCart} navigate={navigate}/>}
    </div>
  );
}

// Mount
const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(<App />);
</script>
</body>
</html>
